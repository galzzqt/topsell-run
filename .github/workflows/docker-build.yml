name: Build & Push Docker Image

on:
  push:
    branches:
      - main        # Jalankan saat push ke main
  workflow_dispatch:  # Bisa dijalankan manual dari GitHub UI

env:
  # Ganti dengan username Docker Hub atau GitHub username Anda
  # Contoh Docker Hub : your-dockerhub-username/topsell-run
  # Contoh GHCR      : ghcr.io/your-github-username/topsell-run
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/topsell-run

jobs:
  build-and-push:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # Diperlukan untuk push ke GHCR

    steps:
      # 1. Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Docker Buildx (mendukung multi-platform & cache)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Login ke GitHub Container Registry (GHCR)
      #    Token GITHUB_TOKEN sudah tersedia otomatis, tidak perlu secret tambahan
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. Extract metadata (tag & label otomatis dari branch/commit)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            # Tag "latest" untuk branch main
            type=raw,value=latest,enable={{is_default_branch}}
            # Tag berdasarkan SHA commit pendek (misal: sha-abc1234)
            type=sha,prefix=sha-,format=short

      # 5. Build & Push image (dengan layer cache untuk mempercepat build berikutnya)
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha        # Gunakan GitHub Actions cache
          cache-to: type=gha,mode=max
